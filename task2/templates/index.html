<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
</head>
<body>

<h2>Calculator</h2>

<form method="POST">

Number 1:
<input type="number" name="num1"><br><br>

Number 2:
<input type="number" name="num2"><br><br>

Operation:
<select name="operation">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select>

<br><br>

<input type="submit" value="Calculate">

</form>

<h3>Result : {{result}}</h3>

</body>
</html>
